name: Generate and Mail Daily History

on:
  schedule:
    # 北京时间 20:00 = UTC 12:00
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '可选：指定目标日期（YYYY-MM-DD），不填则按北京时间次日'
        required: false
        type: string

permissions:
  contents: write

jobs:
  history-daily-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate next-day history markdown
        env:
          TARGET_DATE: ${{ inputs.target_date }}
        run: npm run history:generate

      - name: Commit generated history file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/history/history-*.md
          if git diff --cached --quiet; then
            echo "No history file changes to commit."
          else
            git commit -m "chore(history): generate daily history file"
            git push
          fi

      - name: Send history mail
        env:
          TARGET_DATE: ${{ inputs.target_date }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          HISTORY_MAIL_TO: ${{ secrets.HISTORY_MAIL_TO }}
          HISTORY_MAIL_FROM: ${{ secrets.HISTORY_MAIL_FROM }}
        run: npm run history:send-mail
