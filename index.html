<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史上的今天</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        body {
            background: #f6f8fa;
            padding: 30px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #1a1a1a;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .item {
            padding: 14px 0;
            border-bottom: 1px solid #eee;
        }
        .item:last-child {
            border-bottom: none;
        }
        .link {
            font-size: 16px;
            color: #0969da;
            text-decoration: none;
            font-weight: 500;
        }
        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <h1 class="title">主页</h1>  <!-- 这里就是你要的“主页”标题 -->

        <div class="card">
            <div class="item" v-for="(item, index) in historyList" :key="index">
                <a :href="item.url" class="link" target="_blank" rel="noopener noreferrer">
                    {{ item.name }}
                </a>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue
        createApp({
            setup() {
                const historyList = [
                    {
                        name: "历史上的今天 · 3月31日",
                        url: "https://jsoncc.github.io/today-history/history-2026-03-31.html"
                    },
                    {
                        name: "历史上的今天 · 3月30日",
                        url: "https://jsoncc.github.io/today-history/history-2026-03-30.html"
                    }
                ]
                return { historyList }
            }
        }).mount('#app')
    </script>
</body>
</html>
